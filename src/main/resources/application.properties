spring.application.name=personalFinanceTracker
# In application.properties


spring.datasource.url=jdbc:postgresql://localhost:5432/petracker
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.jpa.defer-datasource-initialization=true
spring.sql.init.mode=always
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# SpringDoc / Swagger UI
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.operationsSorter=method
springdoc.swagger-ui.tagsSorter=alpha
springdoc.swagger-ui.try-it-out-enabled=true

# Demo data bootstrap
app.demo.seed.enabled=true
app.demo.user.name=Demo User
app.demo.user.email=demo@petracker.com
app.demo.user.mobile=9876543210
app.demo.user.password=Demo@123

